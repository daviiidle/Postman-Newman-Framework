name: Newman CI

on:
  schedule:
    - cron: "0 19 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  newman:
    name: Run Newman collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Inspect assets
        run: npm run inspect

      - name: Start mock Placement API
        run: |
          npm run mock-api &
          sleep 2
          curl --fail http://localhost:4010/health

      - name: Run Newman
        run: npm run newman:ci

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/
